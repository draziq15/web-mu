    <script>
        function logout() {
            localStorage.removeItem("username");
            location.reload();
        }

        document.addEventListener("DOMContentLoaded", function () {
            const user = localStorage.getItem("username");
            const authArea = document.getElementById("authArea");

            if (user && authArea) {
                authArea.innerHTML = `
                    <span class="text-dark me-2 small" style="font-weight: 600; white-space: nowrap;">Halo, ${user}</span>
                    <a class="nav-icon position-relative text-decoration-none me-3" href="#">
                        <i class="fa fa-fw fa-user text-success"></i>
                    </a>
                    <a class="nav-icon position-relative text-decoration-none" href="javascript:void(0)" onclick="logout()" title="Keluar">
                        <i class="fa fa-fw fa-sign-out-alt text-danger"></i>
                    </a>
                `;
            }
        });
    </script>
