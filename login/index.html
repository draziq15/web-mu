<!doctype html>
<html lang="en">
  <head>
  	<title>STRX</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

	<link href="https://fonts.googleapis.com/css?family=Lato:300,400,700&display=swap" rel="stylesheet">

	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
	
	<link rel="stylesheet" href="css/style.css">

	</head>
	<body class="img js-fullheight" style="background-image: url(login/images/bg.jpg);">
	<div id="alertBox"></div>
	<section class="ftco-section">
		<div class="container">
			<div class="row justify-content-center">
				<div class="col-md-6 text-center mb-5">
					<h2 class="heading-section">STRX</h2>
				</div>
			</div>
			<div class="row justify-content-center">
				<div class="col-md-6 col-lg-4">
					<div class="login-wrap p-0">
		      	<h3 class="mb-4 text-center">Have an account?</h3>
		      	<form action="#" class="signin-form">
		      		<div class="form-group">
		      			<input type="text" id="loginUsername" class="form-control" placeholder="Username" required>
		      		</div>
	            <div class="form-group">
	              <input id="password-field" type="password" class="form-control" placeholder="Password" required>
	              <span toggle="#password-field" class="fa fa-fw fa-eye field-icon toggle-password"></span>
	            </div>
	            <div class="form-group">
	            	<button type="submit" class="form-control btn btn-primary submit px-3">Sign In</button>
	            </div>
	            <div class="form-group d-md-flex">
	            	<div class="w-50">
		            	<label class="checkbox-wrap checkbox-primary">Remember Me
									  <input type="checkbox" checked>
									  <span class="checkmark"></span>
									</label>
								</div>
								<div class="w-50 text-md-right">
									<a href="#" style="color: #fff">Forgot Password</a>
								</div>
	            </div>
	          </form>
			<p class="w-100 text-center mt-5 mb-4" style="color: rgba(255,255,255,0.5);">
            &mdash; Or Sign In With &mdash;
          </p>

          <div class="social d-flex text-center mb-5">
            <a href="#" class="px-2 py-2 mr-md-1 rounded"><span class="ion-logo-facebook mr-2"></span> Facebook</a>
            <a href="#" class="px-2 py-2 ml-md-1 rounded"><span class="ion-logo-google mr-2"></span> Google</a>
          </div>

          <div class="w-100 text-center">
            <p style="color: rgba(255, 255, 255, 0.7); margin-bottom: 0;">Don't have an account?</p>
            <a href="register.html" style="color: #fbceb5; font-weight: bold; text-decoration: underline;">Create New Account</a>
          </div>
		      </div>
				</div>
			</div>
		</div>
	</section>

	<script src="js/jquery.min.js"></script>
  <script src="js/popper.js"></script>
  <script src="js/bootstrap.min.js"></script>
  <script src="js/main.js"></script>

    <script>
    document.querySelector('.signin-form').addEventListener('submit', async function (e) {
        e.preventDefault(); 
        
        const userField = document.getElementById('loginUsername'); // Ambil element-nya
        const passField = document.getElementById('password-field');
        const alertBox = document.getElementById('alertBox');

        // Munculin loading biar gak bingung
        alertBox.innerHTML = '<div id="message" style="background: orange;">Mengecek...</div>';

        try {
            const res = await fetch("https://herisusanta.my.id/javalogin/api/auth.php", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: `action=login&username=${encodeURIComponent(userField.value)}&password=${encodeURIComponent(passField.value)}`
            });

            const data = await res.json();

            if (data.status === "success") {
                localStorage.setItem("username", userField.value);
                alertBox.innerHTML = '<div id="message" style="background: #28a745;">Login Berhasil!</div>';
                setTimeout(() => window.location.href = "../index.html", 1000);
            } else {
                // INI KUNCINYA: Alert Merah & Nama Dihapus
                alertBox.innerHTML = `<div id="message" style="background: #ff4e4e;">Gagal: Akun Tidak Terdaftar!</div>`;
                
                // Kosongin lagi kotaknya biar bersih
                userField.value = ""; 
                passField.value = "";
                
                // Alert hilang otomatis setelah 3 detik
                setTimeout(() => { alertBox.innerHTML = ""; }, 3000);
            }
        } catch (error) {
            alertBox.innerHTML = '<div id="message" style="background: #ff4e4e;">Server Error!</div>';
        }
    });
</script>
	</body>
</html>
